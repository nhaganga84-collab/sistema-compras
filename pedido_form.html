{% extends 'base.html' %}
{% block title %}Novo Pedido de Compra{% endblock %}
{% block page_title %}<i class="bi bi-clipboard-plus me-2"></i>Novo Pedido de Compra{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-10">
<div class="form-card">
  <form method="post" id="formPedido">
    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <label class="form-label">Fornecedor *</label>
        <select name="fornecedor_id" class="form-select" required>
          <option value="">— Selecionar —</option>
          {% for f in fornecedores %}
          <option value="{{ f.id }}">{{ f.nome }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-12">
        <label class="form-label">Observações</label>
        <textarea name="observacoes" class="form-control" rows="2"></textarea>
      </div>
    </div>

    <hr>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h6 class="mb-0 fw-bold" style="color:var(--primary)">Produtos do Pedido</h6>
      <button type="button" class="btn btn-sm btn-primary-custom" onclick="addItem()"><i class="bi bi-plus-lg me-1"></i>Adicionar Produto</button>
    </div>

    <div id="itens"></div>

    <div class="d-flex justify-content-between align-items-center mt-3">
      <div class="fw-bold fs-5" style="color:var(--primary)">Total: MT <span id="totalGeral">0.00</span></div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary-custom px-4"><i class="bi bi-save me-1"></i>Criar Pedido</button>
        <a href="{{ url_for('pedidos') }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </div>
  </form>
</div>
</div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const produtos = {{ produtos | tojson }};
const prodMap = {};
produtos.forEach(p => { prodMap[p.id] = p; });

function addItem() {
  const div = document.createElement('div');
  div.className = 'item-row';
  div.innerHTML = `
    <div class="row g-2 align-items-end">
      <div class="col-md-5">
        <label class="form-label">Produto</label>
        <select name="produto_id[]" class="form-select prod-select" onchange="fillPreco(this)">
          <option value="">— Selecionar —</option>
          ${produtos.map(p => `<option value="${p.id}">${p.nome} (${p.codigo})</option>`).join('')}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Preço Unit. (MT)</label>
        <input type="number" step="0.01" name="preco_unitario[]" class="form-control preco-input" value="0" onchange="calcTotal()">
      </div>
      <div class="col-md-2">
        <label class="form-label">Qtd</label>
        <input type="number" name="quantidade[]" class="form-control qtd-input" value="1" min="1" onchange="calcTotal()">
      </div>
      <div class="col-md-2 text-end">
        <button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('.item-row').remove(); calcTotal()">
          <i class="bi bi-trash"></i>
        </button>
      </div>
    </div>`;
  document.getElementById('itens').appendChild(div);
}

function fillPreco(sel) {
  const row = sel.closest('.item-row');
  const p = prodMap[sel.value];
  if (p) row.querySelector('.preco-input').value = p.preco_compra;
  calcTotal();
}

function calcTotal() {
  let total = 0;
  document.querySelectorAll('.item-row').forEach(row => {
    const preco = parseFloat(row.querySelector('.preco-input').value) || 0;
    const qtd = parseInt(row.querySelector('.qtd-input').value) || 0;
    total += preco * qtd;
  });
  document.getElementById('totalGeral').textContent = total.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

addItem();
</script>
{% endblock %}
