{% extends 'base.html' %}
{% block title %}Nova Conta a Pagar{% endblock %}
{% block page_title %}<i class="bi bi-credit-card me-2"></i>Nova Conta a Pagar{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-6">
<div class="form-card">
  <form method="post">
    <div class="row g-3">
      <div class="col-12">
        <label class="form-label">Fornecedor *</label>
        <select name="fornecedor_id" class="form-select" required>
          <option value="">— Selecionar —</option>
          {% for f in fornecedores %}
          <option value="{{ f.id }}">{{ f.nome }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Valor (MT) *</label>
        <input type="number" step="0.01" name="valor" class="form-control" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Data de Vencimento</label>
        <input type="date" name="vencimento" class="form-control">
      </div>
      <div class="col-12">
        <label class="form-label">Descrição</label>
        <textarea name="descricao" class="form-control" rows="2"></textarea>
      </div>
    </div>
    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-primary-custom px-4"><i class="bi bi-save me-1"></i>Gravar</button>
      <a href="{{ url_for('contas') }}" class="btn btn-outline-secondary">Cancelar</a>
    </div>
  </form>
</div>
</div>
</div>
{% endblock %}
