{% extends 'base.html' %}
{% block title %}Nova Compra{% endblock %}
{% block page_title %}<i class="bi bi-bag-check me-2"></i>Registar Nova Compra{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-10">
<div class="form-card">
  <form method="post" id="formCompra">
    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <label class="form-label">Fornecedor *</label>
        <select name="fornecedor_id" class="form-select" required>
          <option value="">— Selecionar —</option>
          {% for f in fornecedores %}
          <option value="{{ f.id }}">{{ f.nome }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Método de Pagamento</label>
        <select name="metodo_pagamento" class="form-select">
          <option>Dinheiro</option>
          <option>Transferência Bancária</option>
          <option>M-Pesa</option>
          <option>e-Mola</option>
          <option>Cheque</option>
          <option>Crédito</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">Estado de Pagamento</label>
        <select name="estado_pagamento" class="form-select" id="estadoPag" onchange="toggleVenc()">
          <option value="Pago">Pago</option>
          <option value="Pendente" selected>Pendente</option>
        </select>
      </div>
      <div class="col-md-4" id="divVenc">
        <label class="form-label">Data de Vencimento</label>
        <input type="date" name="vencimento" class="form-control">
      </div>
      <div class="col-12">
        <label class="form-label">Observações</label>
        <textarea name="observacoes" class="form-control" rows="2"></textarea>
      </div>
    </div>

    <hr>
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h6 class="mb-0 fw-bold" style="color:var(--primary)">Produtos Comprados</h6>
      <button type="button" class="btn btn-sm btn-primary-custom" onclick="addItem()"><i class="bi bi-plus-lg me-1"></i>Adicionar Produto</button>
    </div>
    <div id="itens"></div>

    <div class="d-flex justify-content-between align-items-center mt-3">
      <div class="fw-bold fs-5" style="color:var(--primary)">Total: MT <span id="totalGeral">0.00</span></div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary-custom px-4"><i class="bi bi-save me-1"></i>Registar Compra</button>
        <a href="{{ url_for('compras') }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </div>
  </form>
</div>
</div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const produtos = {{ produtos | tojson }};
const prodMap = {};
produtos.forEach(p => { prodMap[p.id] = p; });

function toggleVenc() {
  document.getElementById('divVenc').style.display =
    document.getElementById('estadoPag').value === 'Pendente' ? '' : 'none';
}
toggleVenc();

function addItem() {
  const div = document.createElement('div');
  div.className = 'item-row';
  div.innerHTML = `
    <div class="row g-2 align-items-end">
      <div class="col-md-5">
        <label class="form-label">Produto</label>
        <select name="produto_id[]" class="form-select" onchange="fillPreco(this)">
          <option value="">— Selecionar —</option>
          ${produtos.map(p => `<option value="${p.id}">${p.nome} (Stock: ${p.stock})</option>`).join('')}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Preço Unit. (MT)</label>
        <input type="number" step="0.01" name="preco_unitario[]" class="form-control preco-input" value="0" onchange="calcTotal()">
      </div>
      <div class="col-md-2">
        <label class="form-label">Quantidade</label>
        <input type="number" name="quantidade[]" class="form-control qtd-input" value="1" min="1" onchange="calcTotal()">
      </div>
      <div class="col-md-2 text-end">
        <button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('.item-row').remove(); calcTotal()"><i class="bi bi-trash"></i></button>
      </div>
    </div>`;
  document.getElementById('itens').appendChild(div);
}

function fillPreco(sel) {
  const p = prodMap[sel.value];
  if (p) sel.closest('.item-row').querySelector('.preco-input').value = p.preco_compra;
  calcTotal();
}

function calcTotal() {
  let total = 0;
  document.querySelectorAll('.item-row').forEach(row => {
    total += (parseFloat(row.querySelector('.preco-input').value)||0) * (parseInt(row.querySelector('.qtd-input').value)||0);
  });
  document.getElementById('totalGeral').textContent = total.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}
addItem();
</script>
{% endblock %}
