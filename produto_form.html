{% extends 'base.html' %}
{% block title %}{{ 'Editar' if produto else 'Novo' }} Produto{% endblock %}
{% block page_title %}<i class="bi bi-box-seam me-2"></i>{{ 'Editar' if produto else 'Novo' }} Produto{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-lg-8">
<div class="form-card">
  <form method="post">
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Código *</label>
        <input type="text" name="codigo" class="form-control" value="{{ produto.codigo if produto else '' }}" required placeholder="PRD001">
      </div>
      <div class="col-md-8">
        <label class="form-label">Nome do Produto *</label>
        <input type="text" name="nome" class="form-control" value="{{ produto.nome if produto else '' }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Categoria</label>
        <input type="text" name="categoria" class="form-control" value="{{ produto.categoria if produto else '' }}" placeholder="Alimentação, Higiene...">
      </div>
      <div class="col-md-6">
        <label class="form-label">Fornecedor Principal</label>
        <select name="fornecedor_id" class="form-select">
          <option value="">— Nenhum —</option>
          {% for f in fornecedores %}
          <option value="{{ f.id }}" {{ 'selected' if produto and produto.fornecedor_id == f.id }}>{{ f.nome }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Preço de Compra (MT)</label>
        <input type="number" step="0.01" name="preco_compra" class="form-control" value="{{ produto.preco_compra if produto else 0 }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Preço de Venda (MT)</label>
        <input type="number" step="0.01" name="preco_venda" class="form-control" value="{{ produto.preco_venda if produto else 0 }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Stock Actual</label>
        <input type="number" name="stock" class="form-control" value="{{ produto.stock if produto else 0 }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Stock Mínimo</label>
        <input type="number" name="stock_minimo" class="form-control" value="{{ produto.stock_minimo if produto else 5 }}">
      </div>
    </div>
    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-primary-custom px-4"><i class="bi bi-save me-1"></i>Gravar</button>
      <a href="{{ url_for('produtos') }}" class="btn btn-outline-secondary">Cancelar</a>
    </div>
  </form>
</div>
</div>
</div>
{% endblock %}
